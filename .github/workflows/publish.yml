name: 'Publish Desktop App'

on:
  push:
    tags:
      - 'v*' # Triggers when you push a version tag like v1.0.0

jobs:
  publish-tauri:
    permissions:
      contents: write # Required for creating GitHub Releases

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
          - platform: 'macos-latest'
          - platform: 'ubuntu-22.04'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets (x86_64 + Apple Silicon)
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system dependencies (Tauri v2)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '贝克街私家侦探档案柜 ${{ github.ref_name }}'
          releaseBody: |
            贝克街私家侦探档案柜客户端自动发版。

            **下载说明：**
            - Windows：下载 `.msi` 安装包
            - macOS：下载 `.dmg` 安装包
            - Linux：下载 `.AppImage`

            进度保存在本地，无需登录即可游玩。
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin' || '' }}
