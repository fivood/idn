name: 'Publish Desktop App'

on:
  push:
    tags:
      - 'v*' # Triggers when you push a version tag like v1.0.0

jobs:
  publish-tauri:
    permissions:
      contents: write # Required for creating GitHub Releases

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
          - platform: 'macos-latest'
          - platform: 'ubuntu-22.04'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets (x86_64 + Apple Silicon)
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system dependencies (Tauri v2)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Extract latest changelog
        id: changelog
        run: |
          node -e "
          const fs = require('fs');
          const content = fs.readFileSync('CHANGELOG.md', 'utf8');
          const lines = content.split(/\r?\n/);
          let startIndex = -1;
          let endIndex = -1;
          for (let i = 0; i < lines.length; i++) {
            if (lines[i].startsWith('### [')) {
              if (startIndex === -1) {
                startIndex = i;
              } else {
                endIndex = i;
                break;
              }
            }
          }
          if (startIndex !== -1) {
            const body = lines.slice(startIndex, endIndex !== -1 ? endIndex : undefined).join('\n').trim();
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'body<<EOF\n' + body + '\nEOF\n');
          } else {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'body=No changelog found\n');
          }
          "

      - name: Build Tauri app and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '贝克街私家侦探档案柜 ${{ github.ref_name }}'
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin' || '' }}
