name: 'Publish Desktop App'

on:
  push:
    tags:
      - 'v*' # Triggers the workflow when you push a version tag like v1.0.0

jobs:
  publish-tauri:
    permissions:
      contents: write # Required for creating GitHub Releases and uploading assets
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
          - platform: 'macos-latest'
          - platform: 'ubuntu-22.04'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Targets for macOS cross-compilation (x86_64 and Apple Silicon)
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci # Uses package-lock.json for clean, reproducible installations

      - name: Build and Publish Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '贝克街私家侦探档案柜 ${{ github.ref_name }}'
          releaseBody: '贝克街私家侦探档案柜客户端自动发版。下载下方对应系统安装包即可离线游玩。'
          releaseDraft: false
          prerelease: false
